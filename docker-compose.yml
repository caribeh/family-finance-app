version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: family-finance-db
    environment:
      POSTGRES_DB: family_finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - family-finance-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-finance-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/family_finance
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 3001
    volumes:
      - ./backend/src:/app/src
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - family-finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-finance-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - family-finance-network

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:

networks:
  family-finance-network:
    driver: bridge
